name: Build Binaries

on:
  workflow_dispatch:
    inputs:
      targets:
        description: "Build targets (comma-separated: windows, linux, appimage, deb, mac)"
        required: false
        default: "windows, linux, appimage, deb, mac"

jobs:
  # ────────────────────────────────────────────────────────────
  build-windows:
    name: Build, Windows (.exe)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # Cache pip packages, invalidates when requirements.txt changes.
      # yt-dlp updates frequently, so the weekly date segment forces a
      # fresh install once a week while still saving time on reruns.
      - name: Cache pip (Windows)
        uses: actions/cache@v4
        with:
          path: ~\AppData\Local\pip\Cache
          key: pip-win-${{ hashFiles('requirements.txt') }}-${{ env.CACHE_WEEK }}
          restore-keys: |
            pip-win-${{ hashFiles('requirements.txt') }}-
            pip-win-
        env:
          CACHE_WEEK: ${{ steps.date.outputs.week }}

      - name: Get current week (for cache rotation)
        id: date
        run: echo "week=$(Get-Date -UFormat '%Y-%V')" >> $env:GITHUB_OUTPUT

      - name: Install dependencies
        run: pip install -r requirements.txt pyinstaller pillow

      # Cache PyInstaller bootloader/hooks, keyed on Python + PyInstaller version
      - name: Cache PyInstaller
        uses: actions/cache@v4
        with:
          path: ~\AppData\Roaming\pyinstaller
          key: pyinstaller-win-py3.12-${{ hashFiles('requirements.txt') }}
          restore-keys: pyinstaller-win-py3.12-

      - name: Build
        run: >
          python -m PyInstaller
          --noconfirm --onedir --windowed --clean --noupx
          --icon=icon.png
          --exclude-module pycryptodomex.selftest
          --exclude-module pycryptodomex.tests
          --name "Video Downloader"
          main.py

      - name: Zip portable output
        run: Compress-Archive -Path "dist\Video Downloader" -DestinationPath "Windows_x64-portable.zip"

      - uses: actions/upload-artifact@v4
        with:
          name: VideoDownloader-Windows
          path: Windows_x64-portable.zip

  # ────────────────────────────────────────────────────────────
  build-linux:
    name: Build, Linux (dir / AppImage / .deb)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Get current week (for cache rotation)
        id: date
        run: echo "week=$(date +'%Y-%V')" >> $GITHUB_OUTPUT

      # Cache pip, same weekly-rotation strategy as Windows
      - name: Cache pip (Linux)
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-linux-${{ hashFiles('requirements.txt') }}-${{ steps.date.outputs.week }}
          restore-keys: |
            pip-linux-${{ hashFiles('requirements.txt') }}-
            pip-linux-

      # Cache apt packages list + downloaded .deb files
      - name: Cache apt packages
        uses: actions/cache@v4
        with:
          path: |
            /var/cache/apt/archives
            /var/lib/apt/lists
          key: apt-${{ runner.os }}-${{ hashFiles('.github/workflows/build.yml') }}
          restore-keys: apt-${{ runner.os }}-

      - name: Install system dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y \
            libxcb-xinerama0 libxcb-cursor0 libgl1 libegl1 \
            libdbus-1-3 libxkbcommon-x11-0 \
            fuse libfuse2 \
            dpkg-dev

      - name: Install Python dependencies
        run: pip install -r requirements.txt pyinstaller

      # Cache appimagetool binary, it rarely changes
      - name: Cache appimagetool
        id: cache-appimagetool
        uses: actions/cache@v4
        with:
          path: /usr/local/bin/appimagetool
          key: appimagetool-x86_64-continuous

      - name: Download appimagetool (if not cached)
        if: steps.cache-appimagetool.outputs.cache-hit != 'true'
        run: |
          wget -q \
            https://github.com/AppImage/appimagetool/releases/download/continuous/appimagetool-x86_64.AppImage \
            -O /usr/local/bin/appimagetool
          chmod +x /usr/local/bin/appimagetool

      # ── 1. PyInstaller build ─────────────────────────────────
      - name: PyInstaller build
        run: |
          python -m PyInstaller \
            --noconfirm --onedir --windowed --clean --noupx \
            --icon=icon.png \
            --exclude-module pycryptodomex.selftest \
            --exclude-module pycryptodomex.tests \
            --name "Video Downloader" \
            main.py

      - name: Zip portable output
        run: |
          mkdir -p zip_out
          cp -r "dist/Video Downloader" "zip_out/Video Downloader"
          cd zip_out
          zip -r "../Linux_x64-portable.zip" "Video Downloader"

      - name: Upload plain Linux dir
        uses: actions/upload-artifact@v4
        with:
          name: VideoDownloader-Linux
          path: Linux_x64-portable.zip

      # ── 2. AppImage ──────────────────────────────────────────
      - name: Create AppDir
        run: |
          APPDIR="AppDir"
          BIN_SRC="dist/Video Downloader"

          mkdir -p "$APPDIR/usr/bin"
          mkdir -p "$APPDIR/usr/share/applications"
          mkdir -p "$APPDIR/usr/share/icons/hicolor/256x256/apps"

          cp -r "$BIN_SRC"/. "$APPDIR/usr/bin/"
          cp icon.png "$APPDIR/usr/share/icons/hicolor/256x256/apps/video-downloader.png"
          cp icon.png "$APPDIR/video-downloader.png"

          cat > "$APPDIR/usr/share/applications/video-downloader.desktop" <<EOF
          [Desktop Entry]
          Name=Video Downloader
          Exec=Video Downloader
          Icon=video-downloader
          Type=Application
          Categories=AudioVideo;Network;
          EOF

          cat > "$APPDIR/AppRun" <<'EOF'
          #!/bin/sh
          HERE="$(dirname "$(readlink -f "$0")")"
          exec "$HERE/usr/bin/Video Downloader" "$@"
          EOF
          chmod +x "$APPDIR/AppRun"

          cp "$APPDIR/usr/share/applications/video-downloader.desktop" "$APPDIR/video-downloader.desktop"

      - name: Build AppImage
        run: ARCH=x86_64 appimagetool AppDir VideoDownloader-x86_64.AppImage

      - uses: actions/upload-artifact@v4
        with:
          name: VideoDownloader-AppImage
          path: VideoDownloader-x86_64.AppImage

      # ── 3. .deb ─────────────────────────────────────────────
      - name: Create .deb package
        run: |
          PKG="video-downloader_amd64"
          BIN_SRC="dist/Video Downloader"

          mkdir -p "$PKG/usr/lib/video-downloader"
          mkdir -p "$PKG/usr/bin"
          mkdir -p "$PKG/usr/share/applications"
          mkdir -p "$PKG/usr/share/icons/hicolor/256x256/apps"
          mkdir -p "$PKG/DEBIAN"

          cp -r "$BIN_SRC"/. "$PKG/usr/lib/video-downloader/"

          cat > "$PKG/usr/bin/video-downloader" <<'EOF'
          #!/bin/sh
          exec /usr/lib/video-downloader/"Video Downloader" "$@"
          EOF
          chmod +x "$PKG/usr/bin/video-downloader"

          cp icon.png "$PKG/usr/share/icons/hicolor/256x256/apps/video-downloader.png"

          cat > "$PKG/usr/share/applications/video-downloader.desktop" <<EOF
          [Desktop Entry]
          Name=Video Downloader
          Exec=video-downloader
          Icon=video-downloader
          Type=Application
          Categories=AudioVideo;Network;
          EOF

          cat > "$PKG/DEBIAN/control" <<EOF
          Package: video-downloader
          Version: 2.2.0
          Architecture: amd64
          Maintainer: truelockmc
          Description: GUI & CLI video downloader powered by yt-dlp
          Depends: libgl1, libegl1, libdbus-1-3, libxkbcommon-x11-0
          EOF

          dpkg-deb --build --root-owner-group "$PKG"

      - uses: actions/upload-artifact@v4
        with:
          name: VideoDownloader-deb
          path: "*.deb"

  # ────────────────────────────────────────────────────────────
  build-mac:
    name: Build, macOS universal (.app portable zip)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Get current week (for cache rotation)
        id: date
        run: echo "week=$(date +'%Y-%V')" >> $GITHUB_OUTPUT

      - name: Cache pip (macOS)
        uses: actions/cache@v4
        with:
          path: ~/Library/Caches/pip
          key: pip-mac-${{ hashFiles('requirements.txt') }}-${{ steps.date.outputs.week }}
          restore-keys: |
            pip-mac-${{ hashFiles('requirements.txt') }}-
            pip-mac-

      - name: Cache PyInstaller (macOS)
        uses: actions/cache@v4
        with:
          path: ~/Library/Application Support/pyinstaller
          key: pyinstaller-mac-universal2-py3.12-${{ hashFiles('requirements.txt') }}
          restore-keys: pyinstaller-mac-universal2-py3.12-

      - name: Install Python dependencies
        run: pip install -r requirements.txt pyinstaller pillow

      # ── PyInstaller build ────────────────────────────────────
      # universal2 = single .app that runs natively on both Apple Silicon and Intel
      - name: Build .app bundle (universal2)
        run: |
          python -m PyInstaller \
            --noconfirm --onedir --windowed --clean --noupx \
            --icon=icon.png \
            --exclude-module pycryptodomex.selftest \
            --exclude-module pycryptodomex.tests \
            --target-arch universal2 \
            --name "Video Downloader" \
            main.py

      - name: Zip portable output (ditto)
        run: |
          ditto -c -k --sequesterRsrc --keepParent \
            "dist/Video Downloader.app" \
            "macOS_universal2-portable.zip"

      - uses: actions/upload-artifact@v4
        with:
          name: VideoDownloader-macOS
          path: macOS_universal2-portable.zip
